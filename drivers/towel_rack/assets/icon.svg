  <line x1="26" y1="40" x2="54" y2="40" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="26" y1="50" x2="54" y2="50" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="26" y1="60" x2="54" y2="60" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <!-- Wall mounts -->
