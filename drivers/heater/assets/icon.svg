<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Gas boiler / heater - right-side 3/4 angle view -->
  <!-- Front face -->
  <path d="M8 14 L42 14 L42 72 L8 72 Z" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <!-- Right side face (depth) -->
  <path d="M42 14 L58 6 L58 64 L42 72 Z" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <!-- Top face -->
  <path d="M8 14 L24 6 L58 6 L42 14 Z" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <!-- Flame symbol on front -->
  <path d="M25 34c-2 3-4.5 5.5-4.5 8a4.5 4.5 0 009 0c0-2.5-2.5-5-4.5-8z" fill="currentColor"/>
  <!-- Control panel bar -->
  <rect x="14" y="56" width="22" height="4" rx="2" fill="currentColor"/>
  <!-- Status LEDs -->
  <circle cx="18" cy="64" r="1.5" fill="currentColor"/>
  <circle cx="24" cy="64" r="1.5" fill="currentColor"/>
  <!-- Pipe connections on top -->
  <path d="M18 14 V8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <path d="M32 14 V8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <!-- Depth lines on right face -->
  <line x1="46" y1="20" x2="54" y2="16" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <line x1="46" y1="36" x2="54" y2="32" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <!-- Wall mount plate -->
  <rect x="2" y="18" width="6" height="8" rx="1.5" fill="currentColor" opacity="0.7"/>
  <rect x="2" y="58" width="6" height="8" rx="1.5" fill="currentColor" opacity="0.7"/>
</svg>
