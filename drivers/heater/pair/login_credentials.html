<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
      color: #333;
    }
    h2 { margin-bottom: 5px; }
    p.subtitle { color: #666; margin-top: 0; font-size: 14px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus { border-color: #E3001B; outline: none; }
    button {
      width: 100%;
      padding: 12px;
      background: #E3001B;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #c5001a; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #E3001B; font-size: 13px; margin-top: 8px; display: none; }
    .spinner { display: none; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <h2 data-i18n="pair.login_credentials.title">Connect to Cozytouch</h2>
  <p class="subtitle" data-i18n="pair.login_credentials.subtitle">Enter your Atlantic Cozytouch account credentials</p>

  <div class="form-group">
    <label for="username">Email</label>
    <input type="email" id="username" placeholder="user@example.com" autocomplete="email">
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Your Cozytouch password">
  </div>

  <button id="login-btn" type="button">Login</button>
  <div class="spinner" id="spinner">Connecting...</div>
  <div class="error" id="error-msg"></div>

  <script>
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');
    const spinner = document.getElementById('spinner');

    loginBtn.addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorMsg.textContent = 'Please enter both email and password.';
        errorMsg.style.display = 'block';
        return;
      }

      loginBtn.disabled = true;
      spinner.style.display = 'block';
      errorMsg.style.display = 'none';

      try {
        await Homey.emit('login', { username, password });
        await Homey.showView('list_devices');
      } catch (err) {
        errorMsg.textContent = err.message || 'Login failed. Please check your credentials.';
        errorMsg.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
